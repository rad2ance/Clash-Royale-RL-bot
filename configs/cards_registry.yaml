version: 2

archetypes:
  spell_area:
    card_type: spell
    target_type: area
    can_hit_air: true
    tags: [spell]
  building_ground:
    card_type: building
    target_type: ground
    can_hit_air: false
    tags: [building]
  troop_ground:
    card_type: troop
    target_type: ground
    can_hit_air: false
    tags: [troop, ground]
  troop_any:
    inherits: troop_ground
    target_type: any
    can_hit_air: true
    tags: [troop, air_capable]

