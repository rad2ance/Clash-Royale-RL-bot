name: Feature
description: Plan and track a new capability.
title: "Feature: "
labels: ["feature"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should this unlock?
      placeholder: "Add card metadata so simulator behavior is consistent by card id."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Concrete implementation checklist.
      placeholder: |
        - [ ] Add data model
        - [ ] Integrate into env
        - [ ] Add tests
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true to close this?
      placeholder: |
        - Unit tests cover expected behavior
        - README updated with usage details
    validations:
      required: true
